<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1: Multi-Break Grid</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f4f7f6; }

        header {
            background: #0d6efd;
            color: white;
            padding: 2rem;
        }

        .grid-box {
            background: white;
            border: 2px solid #ddd;
            padding: 20px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<header class="text-center">
    <h1>Lab 01: Multi-Break Grid</h1>
    <p>Bootstrap Responsive Layout</p>
</header>

<main class="container mt-4">

<section class="alert alert-info">
    <h5>Task:</h5>
    <ol>
        <li>Mobile → 1 column</li>
        <li>Tablet → 2 columns</li>
        <li>Desktop → 3 columns</li>
    </ol>
</section>

<section class="row">

<article class="col-12 col-md-6 col-lg-4">
    <div class="grid-box">Card 1</div>
</article>

<article class="col-12 col-md-6 col-lg-4">
    <div class="grid-box">Card 2</div>
</article>

<article class="col-12 col-md-6 col-lg-4">
    <div class="grid-box">Card 3</div>
</article>

<article class="col-12 col-md-6 col-lg-4">
    <div class="grid-box">Card 4</div>
</article>

<article class="col-12 col-md-6 col-lg-4">
    <div class="grid-box">Card 5</div>
</article>

<article class="col-12 col-md-6 col-lg-4">
    <div class="grid-box">Card 6</div>
</article>

</section>

</main>

<footer class="text-center mt-4">
    <p>© 2026 Lab</p>
</footer>

</body>
</html>
